<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>14d</title>
  <style>
    .right_section{
      background-color: rgb(10, 201, 3);
      color: white;
      font-size: 24px;
      position: fixed;
      top: 0;
      bottom: 0;
      right: 0;
      width: 200px;
    }

    .overlay{
      background-color: rgba(0, 0, 0, 0.8);
      position: fixed;
      top: 0;
      bottom: 0;
      right: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal{
      height: 120px;
      width: 560px;
      background-color: white;
      padding: 30px 25px;
      border-radius: 10px;
    }

    p{
      font-family: Arial;
      margin: 0;
    }

    .title{
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .text{
      margin-bottom: 20px;
    }
    
    button{
      font-size: 18px;
      padding: 5px 10px;
    }
  </style>
</head>
<body>
  <div class="right_section">right sidebar</div>
  <div class="overlay">
    <div class="modal">
      <p class="title">Modal Title</p>
      <p class="text">This is a modeal</p>
      <button>Close</button>
    </div>
  </div>
</body>
</html>
