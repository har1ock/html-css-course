<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>14e</title>
  <style>
    .header{
      font-family: Arial;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
    }


    .left_section{
      display: flex;
      margin-left: 70px ;
    }

    img{
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 30px;
      margin-right: 15px; 
    }

    .text{
      font-size: 16px;
      font-weight: bold;
    }

    .add_button{
      background-color: rgb(0, 119, 255);
      margin-right: 15px;
      padding: 8px 14px;
      color: white;
      border: none;
      border-radius: 7px;
      font-weight: bold;
    }
    
    .message_button{
      margin-right: 70px;
      padding: 8px 14px;
      border: none;
      border-radius: 7px;
      font-weight: bold;
    }

  </style>
</head>
<body>
  <div class="header">
    <div class="left_section">
      <img src="2.jpg">
      <p class="text">Oliver Cat</p>
    </div>
    <div class="right_section">
      <button class="add_button">Add Friend</button>
      <button class="message_button">Message</button>
    </div>
  </div>
</body>
</html>
